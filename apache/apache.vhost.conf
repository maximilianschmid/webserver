# Set the ServerName to localhost
ServerName localhost


<VirtualHost *:80>
    ServerName webserver.agenturserver.anorak.io
    #ServerAlias www.webserver.agenturserver.anorak.io

    DocumentRoot /var/www/html/

    # Proxy PHP requests to port 9000 PHP-FPM container
    ProxyPassMatch ^/(.*\.php(/.*)?)$ fcgi://php-56-fpm:9056/var/www/html/$1

    # Set the DocumentRoot for the virtual host

    # Directory configuration for the DocumentRoot
    <Directory /var/www/html/>
        DirectoryIndex index.php
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Define the CustomLog and ErrorLog destinations
    CustomLog /proc/self/fd/1 common
    ErrorLog /proc/self/fd/2
</VirtualHost>

# Configure a VirtualHost to handle requests on port 80
<VirtualHost *:80>
    ServerName physiotherapie-huber.at.test
    ServerAlias www.physiotherapie-huber.at.test

    DocumentRoot /var/www/html/p1account/public/

    # Strip port from Host header when behind Traefik reverse proxy
    RequestHeader edit Host "^(.*?):\d+$" "$1" early
    RequestHeader unset X-Forwarded-Port early

    # Proxy PHP requests to port 9000 PHP-FPM container
    ProxyPassMatch ^/(.*\.php(/.*)?)$ fcgi://php-56-fpm:9056/var/www/html/p1account/public/$1

    # Directory configuration for the DocumentRoot
    <Directory /var/www/html/p1account/public/>
        DirectoryIndex index.php
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Define the CustomLog and ErrorLog destinations
    CustomLog /proc/self/fd/1 common
    ErrorLog /proc/self/fd/2
</VirtualHost>

